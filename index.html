<style>
:root{
  color-scheme:light;
  --navy:#101c2d; --navy-2:#192430;
  --gold:#148695; --gold-soft:#44c5d0;
  --bg:#f3f5f7; --card:#ffffff; --text:#101c2d; --muted:#4A5568; --line:#dfe4ea;
  --ok:#1F8A4C; --nok:#B83A2A; --na:#6C757D; --warn:#C7831C;
  --shadow:0 1px 3px rgba(11,37,69,.08),0 8px 24px rgba(11,37,69,.06);
  --radius:14px;
  --serif:'Playfair Display','Source Serif 4',Georgia,serif;
  --sans:'Inter','Source Sans 3',system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
}
[data-theme="dark"]{
  color-scheme:dark;
  --bg:#0a1422; --card:#101e30; --text:#eaf0f7; --muted:#9fb1c4; --line:#22364f;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.35);
}
[data-theme="dark"] .topbar h2,
[data-theme="dark"] .card h3,
[data-theme="dark"] .kpi .v,
[data-theme="dark"] .modal-head h2,
[data-theme="dark"] .equip-block h4,
[data-theme="dark"] th.sortable:hover,
[data-theme="dark"] .h-navy{color:var(--gold-soft)}
[data-theme="dark"] .col{background:#16263b}
[data-theme="dark"] .bar-track{background:#16263b}
[data-theme="dark"] th{background:#16263b}
[data-theme="dark"] tr.row-os:hover td{background:#16263b}
[data-theme="dark"] .tag.overdue{background:#3a1a1f}
[data-theme="dark"] .tag.tech{background:#0f2e33;color:var(--gold-soft)}
[data-theme="dark"] .tag.sla-ok{background:#123322}
[data-theme="dark"] .dropzone.drag{background:#0f2e33}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{font-family:var(--sans);background:var(--bg);color:var(--text);line-height:1.5;font-size:14px}
h1,h2,h3,h4{margin:0;font-weight:600}
button{font-family:inherit;cursor:pointer}
.app{display:grid;grid-template-columns:240px 1fr;min-height:100vh}
.sidebar{background:linear-gradient(180deg,var(--navy) 0%,var(--navy-2) 100%);color:#eaf0f7;
  padding:20px 16px;display:flex;flex-direction:column;gap:18px;position:sticky;top:0;height:100vh;overflow-y:auto}
.brand{display:flex;align-items:center;gap:11px}
.brand img{width:42px;height:42px;flex:none;border-radius:9px;background:#ffffff12;padding:3px}
.brand .bt{font-family:var(--serif);font-size:19px}
.brand .bs{font-size:10.5px;color:var(--gold-soft);letter-spacing:1.3px;text-transform:uppercase;margin-top:2px}
.menu-btn{display:none}
#sidebar .sidebar-close{display:none;position:absolute;top:14px;right:14px;background:#ffffff14;border:1px solid #ffffff2a;color:#eaf0f7;border-radius:8px;width:30px;height:30px;align-items:center;justify-content:center;font-size:15px;padding:0;z-index:1}
#sidebar .sidebar-close:hover{background:#ffffff26;border-color:var(--gold)}
.scrim{position:fixed;inset:0;background:rgba(10,16,26,.5);z-index:55;display:none}
.scrim.show{display:block}
.side-actions{display:flex;flex-direction:column;gap:8px}
.nav{display:flex;flex-direction:column;gap:4px;margin-top:4px}
.nav button{background:transparent;border:none;color:#c8d5e3;text-align:left;padding:11px 12px;border-radius:9px;font-weight:600;font-size:13.5px;display:flex;align-items:center;gap:9px}
.nav button:hover{background:#ffffff10}
.nav button.active{background:#ffffff18;color:#fff}
.nav button .ico{width:18px;text-align:center}
.foot{margin-top:auto;font-size:10.5px;color:#7c93ab;border-top:1px solid #ffffff1a;padding-top:12px}
.main{min-width:0;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);
  padding:12px 22px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.topbar h2{font-family:var(--serif);font-size:19px;color:var(--navy);white-space:nowrap}
.filters{display:flex;gap:8px;flex-wrap:wrap;flex:1}
.filters input,.filters select{border:1px solid var(--line);border-radius:9px;padding:8px 10px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text)}
.filters input[type=search]{min-width:180px}
.content{padding:20px 22px;flex:1}

.btn{border:1px solid var(--line);background:var(--card);color:var(--text);padding:8px 13px;border-radius:9px;
  font-weight:600;font-size:13px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--gold)}
.btn.primary{background:var(--navy);color:#fff;border-color:var(--navy)}
.btn.gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.btn.danger{color:var(--nok);border-color:#e7c3c0}
.btn.sm{padding:5px 9px;font-size:12px;border-radius:7px}
.btn.block{width:100%;justify-content:center}
.btn.ghost{background:transparent;color:#dbe6f1;border-color:#ffffff33}
.btn.ghost:hover{border-color:var(--gold);background:#ffffff12}

/* ---- Kanban ---- */
.board{display:grid;grid-auto-flow:column;grid-auto-columns:280px;gap:14px;overflow-x:auto;padding-bottom:12px;align-items:start}
.col{background:#e9edf1;border-radius:var(--radius);padding:10px;min-height:200px}
.col h3{font-size:12.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);display:flex;justify-content:space-between;align-items:center;padding:2px 4px 10px}
.col h3 .cnt{background:var(--navy);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px}
.col.dragover{outline:2px dashed var(--gold);outline-offset:-4px}
.card-os{background:var(--card);border-radius:11px;box-shadow:var(--shadow);padding:11px 12px;margin-bottom:10px;cursor:grab;border-left:4px solid var(--gold)}
.card-os.prio-Urgente{border-left-color:var(--nok)}
.card-os.prio-Alta{border-left-color:var(--warn)}
.card-os.prio-Baixa{border-left-color:var(--na)}
.card-os:active{cursor:grabbing}
.card-os.dragging{opacity:.35}
.card-os .n{font-weight:700;font-size:13.5px}
.card-os .m{color:var(--muted);font-size:12px;margin-top:2px}
.card-os .tags{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--bg);color:var(--muted)}
.tag.overdue{background:#fbe3e0;color:var(--nok)}
.tag.tech{background:#e3f3f4;color:var(--gold)}
.tag.sla-ok{background:#e3f5ea;color:var(--ok)}

/* ---- Table ---- */
.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow)}
.table-wrap table{box-shadow:none}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--line);font-size:13px;white-space:nowrap}
th{background:#eef1f4;text-transform:uppercase;font-size:11px;letter-spacing:.4px;color:var(--muted)}
th.sortable{cursor:pointer;user-select:none}
th.sortable:hover{color:var(--navy)}
tr:last-child td{border-bottom:none}
tr.row-os{cursor:pointer}
tr.row-os:hover td{background:#f7f9fb}
.badge{padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;background:var(--gold);white-space:nowrap}

/* ---- KPI cards ---- */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.kpi{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px}
.kpi .v{font-family:var(--serif);font-size:30px;color:var(--navy)}
.kpi .l{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.kpi.warn .v{color:var(--nok)}
.bars{display:flex;flex-direction:column;gap:8px}
.bar-row{display:flex;align-items:center;gap:8px;font-size:12.5px}
.bar-row .lbl{width:150px;flex:none;color:var(--muted)}
.bar-track{flex:1;background:#e9edf1;border-radius:6px;height:16px;overflow:hidden}
.bar-fill{background:var(--gold);height:100%;border-radius:6px}
.card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;margin-bottom:16px}
.card h3{font-family:var(--serif);color:var(--navy);margin-bottom:12px}
.h-navy{font-family:var(--serif);color:var(--navy)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}

/* ---- Modal ---- */
.modal-bg{position:fixed;inset:0;background:rgba(16,28,45,.55);display:none;align-items:flex-start;justify-content:center;padding:30px 16px;overflow-y:auto;z-index:50}
.modal-bg.show{display:flex}
.modal{background:var(--card);border-radius:16px;max-width:820px;width:100%;padding:0;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-head{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:flex-start}
.modal-head h2{font-family:var(--serif);color:var(--navy);font-size:20px}
.modal-head .sub{color:var(--muted);font-size:12.5px;margin-top:3px}
.modal-body{padding:20px 22px;max-height:70vh;overflow-y:auto}
.modal-foot{padding:14px 22px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px}
.x{background:transparent;border:none;font-size:20px;color:var(--muted)}
.field-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px}
.field-row label{display:block;font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:700}
.field-row select,.field-row input,.field-row textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 9px;font-size:13px;font-family:inherit;background:var(--card);color:var(--text)}
.equip-block{border:1px solid var(--line);border-radius:11px;padding:12px;margin-bottom:10px}
.equip-block h4{font-size:13.5px;color:var(--navy)}
.equip-block .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px;font-size:12.5px}
.equip-block .grid2 .k{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;margin-top:6px}
.equip-block .grid2 .v{margin-bottom:4px}
.photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.photos img{width:78px;height:78px;object-fit:cover;border-radius:8px;border:1px solid var(--line)}
.checklist-grid{display:grid;grid-template-columns:1fr auto;gap:6px 12px;font-size:12.5px}
.chk-ok{color:var(--ok);font-weight:700}
.chk-nok{color:var(--nok);font-weight:700}
.chk-na{color:var(--na)}
.empty{text-align:center;color:var(--muted);padding:40px 10px}
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:8px;z-index:99}
.toast{background:var(--navy);color:#fff;padding:11px 16px;border-radius:10px;font-size:13px;box-shadow:var(--shadow)}
.toast.err{background:var(--nok)}
.toast.ok{background:var(--ok)}
.toast.warn{background:var(--warn)}
.dropzone{border:2px dashed var(--line);border-radius:var(--radius);padding:36px;text-align:center;color:var(--muted);margin-bottom:16px;background:var(--card)}
.dropzone.drag{border-color:var(--gold);color:var(--gold);background:#f0fbfb}

/* ---- Responsivo ---- */
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;left:0;top:0;bottom:0;width:270px;z-index:60;
    transform:translateX(-100%);transition:transform .22s ease;box-shadow:0 0 40px rgba(0,0,0,.35)}
  .sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex}
  #sidebar .sidebar-close{display:inline-flex}
  .board{grid-auto-columns:82vw}
  .kpi-grid{grid-template-columns:repeat(auto-fit,minmax(140px,1fr))}
  .topbar h2{font-size:16px}
}
@media(max-width:520px){
  .content{padding:14px}
  .topbar{padding:10px 14px;gap:10px}
  .modal-bg{padding:0}
  .modal{max-width:100%;min-height:100vh;border-radius:0}
  .modal-body{padding:16px}
  .field-row{grid-template-columns:1fr 1fr}
  .filters input[type=search]{min-width:120px}
  .board{grid-auto-columns:88vw}
}
</style>

<script>
/* =========================================================================
   WonderLab — Painel de Gestão de OS de Laboratório
   100% client-side: nenhum servidor, nenhuma rede. Os dados de cada OS vêm
   dos arquivos JSON exportados pelo WonderLab (botão "Exportar JSON"), e
   ficam guardados neste navegador via IndexedDB. Os campos de GESTÃO
   (status do fluxo, responsável, prazo, prioridade, notas internas) são
   adicionados aqui e preservados quando a mesma OS é reimportada depois de
   editada no WonderLab.
   ========================================================================= */

const STAGES = ["Recebido","Em Diagnóstico","Consignação","Pronto / Testado","Entregue ao Cliente","Sem Reparo"];
const PRIORITIES = ["Baixa","Normal","Alta","Urgente"];
const BUILD = "build v1.3.0 · 2026-07-23";

/* ---------------- IndexedDB (dados das OS) ---------------- */
const DB_NAME = 'wonderlab_painel', STORE = 'os';
function idbOpen(){
  return new Promise((res, rej)=>{
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = e=>{ const d=e.target.result; if(!d.objectStoreNames.contains(STORE)) d.createObjectStore(STORE, {keyPath:'id'}); };
    r.onsuccess = ()=>res(r.result);
    r.onerror = ()=>rej(r.error);
  });
}
async function idbPut(rec){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).put(rec); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }
async function idbGet(id){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readonly'); const rq=tx.objectStore(STORE).get(id); rq.onsuccess=()=>res(rq.result||null); rq.onerror=()=>rej(rq.error); }); }
async function idbGetAll(){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readonly'); const rq=tx.objectStore(STORE).getAll(); rq.onsuccess=()=>res(rq.result||[]); rq.onerror=()=>rej(rq.error); }); }
async function idbDelete(id){ const db=await idbOpen(); return new Promise((res,rej)=>{ const tx=db.transaction(STORE,'readwrite'); tx.objectStore(STORE).delete(id); tx.oncomplete=()=>res(); tx.onerror=()=>rej(tx.error); }); }

/* ---------------- Técnicos (localStorage, lista simples) ---------------- */
function getTechs(){ try{ return JSON.parse(localStorage.getItem('wlp_techs')||'[]'); }catch(e){ return []; } }
function setTechs(list){ try{ localStorage.setItem('wlp_techs', JSON.stringify(list)); }catch(e){} }
function addTechIfMissing(name){ if(!name) return; const l=getTechs(); if(!l.includes(name)){ l.push(name); setTechs(l); } }

/* ---------------- Estado em memória ---------------- */
let ALL = [];         // todas as OS (do IndexedDB)
let ORDERS = [];       // após filtros
let recordsById = {};  // lookup rápido por id (usado no reordenar do Kanban)
let VIEW = 'kanban';
let FILTERS = { q:'', tech:'', priority:'' };
let listSort = { key:'numero', dir:'asc' };

function toggleSidebar(open){
  const sidebar = document.getElementById('sidebar');
  const next = (typeof open === 'boolean') ? open : !sidebar.classList.contains('open');
  sidebar.classList.toggle('open', next);
  document.getElementById('scrim').classList.toggle('show', next);
}
function toggleTheme(){
  const h = document.documentElement;
  const isDark = h.getAttribute('data-theme') === 'dark';
  h.setAttribute('data-theme', isDark ? 'light' : 'dark');
  try{ localStorage.setItem('wlp_theme', isDark ? 'light' : 'dark'); }catch(e){}
}

function toast(msg, type='', ms=3500){
  const t = document.createElement('div'); t.className='toast '+type; t.textContent=msg;
  document.getElementById('toastWrap').appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='.4s'; setTimeout(()=>t.remove(),400); }, ms);
}
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function todayISO(){
  // Data de HOJE no fuso local (nao usar toISOString(), que e UTC e "vira o dia"
  // horas antes da meia-noite local no Brasil, adiantando o SLA por engano).
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function parseLocalDate(iso){
  // "YYYY-MM-DD" -> Date à meia-noite local (new Date(iso) interpretaria como UTC
  // e podia jogar a data para o dia/mês anterior dependendo do fuso do usuário).
  if(!iso) return null;
  const [y,m,d] = iso.split('-').map(Number);
  return (y&&m&&d) ? new Date(y, m-1, d) : null;
}
function fmtDate(iso){ if(!iso) return '—'; const p=iso.split('-'); return p.length===3 ? `${p[2]}/${p[1]}/${p[0]}` : iso; }
// Regra de SLA por prioridade: Prazo (SLA) = data de entrada + N dias úteis
// (segunda a sexta). Não há calendário de feriados integrado — feriados nacionais,
// estaduais ou municipais não são descontados, só fins de semana.
const SLA_BUSINESS_DAYS = { 'Baixa':20, 'Normal':15, 'Alta':10, 'Urgente':5 };
function addBusinessDays(dateStr, n){
  const d = parseLocalDate(dateStr);
  if(!d) return '';
  let added = 0;
  while(added < n){
    d.setDate(d.getDate()+1);
    const dow = d.getDay(); // 0=domingo, 6=sábado
    if(dow!==0 && dow!==6) added++;
  }
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function computeSlaDueDate(dataEntrada, priority){
  if(!dataEntrada) return '';
  const dias = SLA_BUSINESS_DAYS[priority] ?? SLA_BUSINESS_DAYS['Normal'];
  return addBusinessDays(dataEntrada, dias);
}
// Estágios em que o reparo em si já está concluído (aguardando retirada/envio ou já
// entregue). A partir daqui o SLA é um fato consumado — não deve mais "andar" com o
// relógio: ou o reparo ficou pronto (readyAt) até o prazo (dueDate), ou não ficou.
const READY_STAGES = ['Pronto / Testado','Entregue ao Cliente'];
function slaStatus(o){
  // null = ainda em andamento (sem prazo, ou reparo ainda não concluído);
  // true = SLA cumprido; false = SLA descumprido.
  // "Pronto em (SLA)" é permanente — só muda por edição manual no modal. Por isso,
  // uma vez confirmado, o veredito de SLA fica TRAVADO aqui, mesmo que a OS depois
  // volte para retrabalho ou vá para "Sem Reparo": só muda se alguém editar a data
  // manualmente (decisão explícita do usuário, não recalcula sozinho com o estágio).
  if(!o.dueDate || !o.readyAt) return null;
  return o.readyAt <= o.dueDate;
}
function isOverdue(o){
  if(!o.dueDate || o.workflowStatus==='Entregue ao Cliente') return false;
  // Reparo já concluído (está ou já esteve em "Pronto / Testado" ou equivalente —
  // "Pronto em (SLA)" é permanente): o atraso é um fato do passado — compara a data em
  // que ficou pronto com o prazo, não com hoje. Isso evita o falso positivo de um
  // equipamento reparado no prazo mas que segue "atrasado" indefinidamente só porque o
  // cliente ainda não retirou/recebeu. O veredito fica travado mesmo que a OS volte
  // para retrabalho ou vá para "Sem Reparo" depois — só muda por edição manual.
  if(o.readyAt) return o.readyAt > o.dueDate;
  return o.dueDate < todayISO();
}
function slaConfirmHTML(o){
  const st = slaStatus(o);
  if(st===null){
    if(!o.dueDate) return '<span style="color:var(--muted);font-size:12.5px">Sem prazo (SLA) definido para esta OS.</span>';
    if(!READY_STAGES.includes(o.workflowStatus||STAGES[0])) return '<span style="color:var(--muted);font-size:12.5px">Reparo ainda em andamento — o SLA será confirmado quando o status for "Pronto / Testado".</span>';
    return '<span style="color:var(--muted);font-size:12.5px">Informe a data em que o reparo ficou pronto para confirmar o SLA.</span>';
  }
  return st
    ? `<span class="tag sla-ok">✓ SLA cumprido</span> <span style="color:var(--muted);font-size:12.5px">ficou pronto em ${fmtDate(o.readyAt)} · prazo ${fmtDate(o.dueDate)}</span>`
    : `<span class="tag overdue">⚠ SLA descumprido</span> <span style="color:var(--muted);font-size:12.5px">ficou pronto em ${fmtDate(o.readyAt)} · prazo era ${fmtDate(o.dueDate)}</span>`;
}
function refreshSlaConfirm(){
  const statusSel = document.getElementById('mStatus'); if(!statusSel) return;
  const status = statusSel.value;
  const readyInput = document.getElementById('mReadyAt');
  const isReady = READY_STAGES.includes(status);
  readyInput.disabled = !isReady;
  if(isReady && !readyInput.value) readyInput.value = todayISO();
  const due = document.getElementById('mDue').value;
  // Usa o valor real do campo (mesmo desabilitado) — o veredito de SLA, uma vez
  // confirmado, fica travado independente do status atual (ver slaStatus/isOverdue).
  document.getElementById('slaConfirm').innerHTML = slaConfirmHTML({ dueDate: due, readyAt: readyInput.value, workflowStatus: status });
}
function refreshDuePreview(){
  // Ao trocar a prioridade no modal, recalcula o Prazo (SLA) na hora (visível antes
  // de salvar), seguindo a regra de dias úteis por prioridade. O campo continua
  // editável — o que estiver nele no momento de salvar é o que grava.
  const prioritySel = document.getElementById('mPriority'); if(!prioritySel) return;
  const dueInput = document.getElementById('mDue');
  const computed = computeSlaDueDate(prioritySel.dataset.entrada, prioritySel.value);
  if(computed) dueInput.value = computed;
  refreshSlaConfirm();
}

/* ---------------- Import de OS (JSON exportado do WonderLab) ---------------- */
document.getElementById('importInput').addEventListener('change', e=>{
  // Copia para um array estável ANTES de limpar o input: o FileList de
  // e.target.files é "vivo" e esvazia junto quando value é resetado, o que
  // cortava o processamento no meio de uma importação com vários arquivos.
  const files = Array.from(e.target.files);
  e.target.value = '';
  importFiles(files);
});

// Um backup completo do painel (gerado por "Exportar backup do painel") tem um
// formato diferente de uma OS individual exportada do WonderLab: é um envelope
// { app:'wonderlab-painel', orders:[...], techs:[...] }, sem "id" no nível raiz.
// Restaura cada OS do backup como está (idbPut direto — o backup já contém os
// campos de gestão do próprio painel) e mescla a lista de técnicos.
async function restoreOrdersFromBackup(payload){
  const orders = Array.isArray(payload.orders) ? payload.orders : [];
  for(const o of orders) await idbPut(o);
  if(Array.isArray(payload.techs)) setTechs([...new Set([...getTechs(), ...payload.techs])]);
  return orders.length;
}
async function importFiles(fileList){
  let created=0, updated=0, failed=0, restoredFromBackup=0;
  // Novas OS sempre entram no FINAL da coluna "Recebido": calcula a maior
  // posição já usada ali e vai incrementando para cada OS nova do lote.
  const currentAll = await idbGetAll();
  let nextOrder = Math.max(0, ...currentAll
    .filter(o=>(o.workflowStatus||STAGES[0])===STAGES[0])
    .map(o=>o.order ?? 0)) || 0;

  for(const file of fileList){
    try{
      const text = await file.text();
      const raw = JSON.parse(text);
      // Arquivo de backup do painel escolhido aqui (por engano ou não — os dois
      // botões passam a aceitar os dois formatos): restaura em vez de tentar tratar
      // como uma única OS, que sempre falharia com "JSON sem id de OS válido".
      if(raw && raw.app==='wonderlab-painel' && Array.isArray(raw.orders)){
        restoredFromBackup += await restoreOrdersFromBackup(raw);
        continue;
      }
      if(!raw || typeof raw!=='object' || !raw.id) throw new Error('JSON sem id de OS válido');
      const existing = await idbGet(raw.id);
      if(!existing) nextOrder += 1;
      const priority = (existing && existing.priority) || 'Normal';
      const merged = {
        ...raw,
        workflowStatus: (existing && existing.workflowStatus) || STAGES[0],
        // Responsável: ao criar a OS pela primeira vez, assume automaticamente
        // o técnico que executou o reparo na bancada (campo do WonderLab).
        // Numa reimportação, preserva quem o gestor já tiver atribuído aqui.
        assignedTech: existing ? (existing.assignedTech || '') : (raw.tecnico || ''),
        // Prazo (SLA): se ainda não existe (OS nova, ou já existente mas nunca
        // preenchida), calcula automaticamente pela regra de dias úteis por prioridade.
        // Se já existe um valor gravado, reimportar NÃO sobrescreve — só muda por
        // edição manual ou ao trocar a prioridade no modal.
        dueDate: (existing && existing.dueDate) || computeSlaDueDate(raw.dataEntrada, priority),
        priority,
        notesInternas: existing ? (existing.notesInternas || '') : '',
        deliveredAt: existing ? (existing.deliveredAt || null) : null,
        readyAt: existing ? (existing.readyAt || null) : null,
        order: existing ? (existing.order ?? nextOrder) : nextOrder,
        importedAt: (existing && existing.importedAt) || Date.now(),
        lastImportedAt: Date.now(),
      };
      await idbPut(merged);
      existing ? updated++ : created++;
      if(raw.tecnico) addTechIfMissing(raw.tecnico);
    }catch(err){ failed++; console.error('Falha ao importar', file.name, err); }
  }
  await loadAll();
  render();
  const parts = [];
  if(created) parts.push(created+' nova(s)');
  if(updated) parts.push(updated+' atualizada(s)');
  if(restoredFromBackup) parts.push(restoredFromBackup+' restaurada(s) do backup');
  if(failed) parts.push(failed+' com erro');
  toast('Importação: '+(parts.join(', ')||'nada importado'), failed?'warn':'ok', 4500);
}

/* drag & drop de arquivos JSON direto na página */
['dragover','drop'].forEach(evt=>document.addEventListener(evt, e=>e.preventDefault()));
document.addEventListener('drop', e=>{
  const files = Array.from(e.dataTransfer.files||[]).filter(f=>f.name.endsWith('.json'));
  if(files.length) importFiles(files);
});

/* ---------------- Backup completo do painel (todas as OS + técnicos) ---------------- */
async function exportBackup(){
  const all = await idbGetAll();
  const payload = { app:'wonderlab-painel', version:1, exportedAt:Date.now(), techs:getTechs(), orders:all };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `painel-gestao-backup_${todayISO()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  toast('Backup exportado.', 'ok');
}
document.getElementById('restoreInput').addEventListener('change', async e=>{
  const file = e.target.files[0]; e.target.value=''; if(!file) return;
  try{
    const payload = JSON.parse(await file.text());
    if(payload && payload.app==='wonderlab-painel' && Array.isArray(payload.orders)){
      const n = await restoreOrdersFromBackup(payload);
      await loadAll(); render();
      toast(`Backup restaurado: ${n} OS.`, 'ok');
    }else{
      // Não é um backup do painel — trata como OS individual do WonderLab (mesmo
      // formato aceito por "Importar OS (JSON)"), pra este botão também não travar
      // num arquivo válido só por ter sido escolhido no campo errado.
      await importFiles([file]);
    }
  }catch(err){ toast('Backup inválido: '+err.message, 'err'); }
});

/* ---------------- Carregar / filtrar ---------------- */
async function loadAll(){
  ALL = await idbGetAll();
  // migração: coluna "Aguardando Peça" foi renomeada para "Consignação"
  for(const o of ALL){
    if(o.workflowStatus === 'Aguardando Peça'){ o.workflowStatus = 'Consignação'; await idbPut(o); }
  }
  recordsById = Object.fromEntries(ALL.map(o=>[o.id, o]));
  const tsel = document.getElementById('fTech');
  const cur = tsel.value;
  tsel.innerHTML = '<option value="">Todos os técnicos</option>';
  getTechs().forEach(t=>{ const o=document.createElement('option'); o.value=t; o.textContent=t; tsel.appendChild(o); });
  tsel.value = cur;
  applyFilters();
}
function applyFilters(){
  ORDERS = ALL.filter(o=>{
    if(FILTERS.q){
      const q = FILTERS.q.toLowerCase();
      const hay = [o.numero,o.cliente,o.embarcacao].filter(Boolean).join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    if(FILTERS.tech && o.assignedTech !== FILTERS.tech) return false;
    if(FILTERS.priority && o.priority !== FILTERS.priority) return false;
    return true;
  }).sort((a,b)=>(b.lastImportedAt||0)-(a.lastImportedAt||0));
}
function clearFilters(){
  document.getElementById('fq').value=''; document.getElementById('fTech').value=''; document.getElementById('fPriority').value='';
  FILTERS = { q:'', tech:'', priority:'' }; applyFilters(); render();
}
document.getElementById('fq').addEventListener('input', e=>{ FILTERS.q=e.target.value; applyFilters(); render(); });
document.getElementById('fTech').addEventListener('change', e=>{ FILTERS.tech=e.target.value; applyFilters(); render(); });
document.getElementById('fPriority').addEventListener('change', e=>{ FILTERS.priority=e.target.value; applyFilters(); render(); });
PRIORITIES.forEach(p=>{ const o=document.createElement('option'); o.value=p; o.textContent=p; document.getElementById('fPriority').appendChild(o); });

document.querySelectorAll('.nav button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    VIEW = btn.dataset.view;
    document.getElementById('viewTitle').textContent = btn.textContent.trim();
    document.getElementById('filterBar').style.display = (VIEW==='kanban'||VIEW==='lista') ? 'flex' : 'none';
    toggleSidebar(false);
    render();
  });
});

async function updateOrder(id, patch){
  const rec = await idbGet(id); if(!rec) return;
  Object.assign(rec, patch);
  await idbPut(rec);
  await loadAll();
}

function render(){
  if(VIEW==='kanban') renderKanban();
  else if(VIEW==='lista') renderLista();
  else if(VIEW==='dash') renderDash();
  else if(VIEW==='equipe') renderEquipe();
}

/* ---------------- Kanban ---------------- */
function dueTagHTML(o){
  if(!o.dueDate) return '';
  const st = slaStatus(o);
  // Reparo já concluído: mostra a confirmação (cumprido/descumprido) em vez do prazo
  // "correndo", que pararia de fazer sentido com o equipamento só aguardando retirada.
  if(st===true) return `<span class="tag sla-ok">✓ SLA no prazo</span>`;
  if(st===false) return `<span class="tag overdue">⚠ SLA descumprido</span>`;
  const overdue = isOverdue(o);
  return `<span class="tag ${overdue?'overdue':''}">${overdue?'Atrasada · ':''}${fmtDate(o.dueDate)}</span>`;
}
function dueCellHTML(o){
  if(!o.dueDate) return '—';
  const st = slaStatus(o);
  if(st===true) return `<span style="color:var(--ok);font-weight:700">${fmtDate(o.dueDate)} ✓</span>`;
  if(st===false) return `<span style="color:var(--nok);font-weight:700">${fmtDate(o.dueDate)} ⚠</span>`;
  const overdue = isOverdue(o);
  return (overdue?'<span style="color:var(--nok);font-weight:700">':'')+fmtDate(o.dueDate)+(overdue?' ⚠</span>':'');
}
function osCardHTML(o){
  return `<div class="card-os prio-${esc(o.priority)}" draggable="true" data-id="${esc(o.id)}" onclick="openDetail('${esc(o.id)}')">
    <div class="n">${esc(o.numero || '(sem número)')}</div>
    <div class="m">${esc(o.cliente || '—')}</div>
    <div class="m">${esc(o.embarcacao || '—')} · ${(o.equipamentos||[]).length} equip.</div>
    <div class="m">Entrada ${fmtDate(o.dataEntrada)}</div>
    <div class="tags">
      <span class="tag">${esc(o.priority)}</span>
      ${o.assignedTech ? `<span class="tag tech">${esc(o.assignedTech)}</span>` : ''}
      ${dueTagHTML(o)}
    </div>
  </div>`;
}
function sortByOrder(list){
  return [...list].sort((a,b)=>(a.order ?? a.importedAt ?? 0)-(b.order ?? b.importedAt ?? 0));
}
function renderKanban(){
  const el = document.getElementById('content');
  if(!ALL.length){ el.innerHTML = emptyStateHTML(); return; }
  if(!ORDERS.length){ el.innerHTML = '<div class="empty">Nenhuma OS corresponde aos filtros.</div>'; return; }
  el.innerHTML = `<div class="board" id="board"></div>`;
  const board = document.getElementById('board');
  STAGES.forEach(stage=>{
    const items = sortByOrder(ORDERS.filter(o=>(o.workflowStatus||STAGES[0])===stage));
    const col = document.createElement('div'); col.className='col'; col.dataset.stage=stage;
    col.innerHTML = `<h3>${esc(stage)} <span class="cnt">${items.length}</span></h3><div class="col-items"></div>`;
    const itemsEl = col.querySelector('.col-items');
    items.forEach(o=>itemsEl.insertAdjacentHTML('beforeend', osCardHTML(o)));
    board.appendChild(col);
  });
  setupKanbanDragDrop(board);
}

/* Arrastar-e-soltar: reordena dentro da mesma coluna e/ou move entre colunas
   (mudando o status). Durante o arraste (dragover), o card é fisicamente
   reposicionado no DOM em tempo real; ao soltar (dragend), a posição final
   no DOM é usada para calcular a nova ordem (valor fracionário entre os
   vizinhos) e, se a coluna mudou, o novo status — tudo persistido de uma vez. */
function getDragAfterElement(container, y){
  const els = [...container.querySelectorAll('.card-os:not(.dragging)')];
  return els.reduce((closest, child)=>{
    const box = child.getBoundingClientRect();
    const offset = y - box.top - box.height/2;
    if(offset < 0 && offset > closest.offset) return { offset, element: child };
    return closest;
  }, { offset: Number.NEGATIVE_INFINITY, element: null }).element;
}
function setupKanbanDragDrop(board){
  board.querySelectorAll('.card-os').forEach(card=>{
    card.addEventListener('dragstart', e=>{
      card.classList.add('dragging');
      e.dataTransfer.setData('text/plain', card.dataset.id);
      e.dataTransfer.effectAllowed = 'move';
    });
    card.addEventListener('dragend', async ()=>{
      card.classList.remove('dragging');
      board.querySelectorAll('.col').forEach(c=>c.classList.remove('dragover'));
      const col = card.closest('.col'); if(!col) return;
      const stage = col.dataset.stage;
      const siblings = [...col.querySelectorAll('.card-os')];
      const idx = siblings.indexOf(card);
      const prevRec = idx>0 ? recordsById[siblings[idx-1].dataset.id] : null;
      const nextRec = idx<siblings.length-1 ? recordsById[siblings[idx+1].dataset.id] : null;
      const prevOrder = prevRec ? (prevRec.order ?? 0) : null;
      const nextOrder = nextRec ? (nextRec.order ?? 0) : null;
      let newOrder;
      if(prevOrder==null && nextOrder==null) newOrder = 1;
      else if(prevOrder==null) newOrder = nextOrder - 1;
      else if(nextOrder==null) newOrder = prevOrder + 1;
      else newOrder = (prevOrder + nextOrder) / 2;

      const id = card.dataset.id;
      const rec = recordsById[id];
      const patch = { order: newOrder };
      const changedStage = rec && (rec.workflowStatus||STAGES[0]) !== stage;
      if(changedStage){
        patch.workflowStatus = stage;
        patch.deliveredAt = stage==='Entregue ao Cliente' ? ((rec&&rec.deliveredAt)||Date.now()) : null;
        // Marca automaticamente quando o reparo ficou pronto, mas só na primeira vez
        // (enquanto ainda não existe readyAt). "Pronto em (SLA)" nunca é apagado nem
        // sobrescrito sozinho ao sair de um estágio pronto — uma vez definido, só muda
        // por edição manual no modal de detalhe.
        if(READY_STAGES.includes(stage) && !(rec && rec.readyAt)) patch.readyAt = todayISO();
      }
      await updateOrder(id, patch);
      if(changedStage) toast('Status atualizado para "'+stage+'".', 'ok');
      render();
    });
  });
  board.querySelectorAll('.col').forEach(col=>{
    const itemsEl = col.querySelector('.col-items');
    col.addEventListener('dragover', e=>{
      e.preventDefault();
      col.classList.add('dragover');
      const dragging = board.querySelector('.card-os.dragging');
      if(!dragging) return;
      const after = getDragAfterElement(itemsEl, e.clientY);
      if(after==null) itemsEl.appendChild(dragging);
      else itemsEl.insertBefore(dragging, after);
    });
    col.addEventListener('dragleave', e=>{
      if(!col.contains(e.relatedTarget)) col.classList.remove('dragover');
    });
  });
}
function emptyStateHTML(){
  return `<div class="dropzone" id="dz">
    <h3 class="h-navy" style="margin-bottom:8px">Nenhuma OS importada ainda</h3>
    <p>No WonderLab, abra a OS e clique em <b>"Exportar JSON"</b>. Depois, aqui, clique em <b>"Importar OS (JSON)"</b> na barra lateral — ou simplesmente arraste o(s) arquivo(s) .json para esta página.</p>
  </div>`;
}

/* ---------------- Lista ---------------- */
const LIST_COLUMNS = [
  { key:'numero', label:'Nº OS' },
  { key:'cliente', label:'Cliente' },
  { key:'embarcacao', label:'Embarcação' },
  { key:'status', label:'Status' },
  { key:'priority', label:'Prioridade' },
  { key:'tech', label:'Responsável' },
  { key:'entrada', label:'Entrada' },
  { key:'due', label:'Prazo' },
  { key:'equip', label:'Equip.' },
];
function listSortValue(o, key){
  switch(key){
    case 'numero': return o.numero||'';
    case 'cliente': return o.cliente||'';
    case 'embarcacao': return o.embarcacao||'';
    case 'status': return o.workflowStatus||STAGES[0];
    case 'priority': return o.priority||'Normal';
    case 'tech': return o.assignedTech||'';
    case 'entrada': return o.dataEntrada||'';
    case 'due': return o.dueDate||'';
    case 'equip': return (o.equipamentos||[]).length;
    default: return '';
  }
}
function renderLista(){
  const el = document.getElementById('content');
  if(!ALL.length){ el.innerHTML = emptyStateHTML(); return; }
  if(!ORDERS.length){ el.innerHTML = '<div class="empty">Nenhuma OS corresponde aos filtros.</div>'; return; }

  const sorted = [...ORDERS].sort((a,b)=>{
    const va = listSortValue(a, listSort.key), vb = listSortValue(b, listSort.key);
    let cmp;
    if(typeof va === 'number' && typeof vb === 'number') cmp = va - vb;
    else cmp = String(va).localeCompare(String(vb), 'pt-BR', {sensitivity:'base', numeric:true});
    return listSort.dir==='asc' ? cmp : -cmp;
  });

  const rows = sorted.map(o=>{
    return `<tr class="row-os" onclick="openDetail('${esc(o.id)}')">
      <td><b>${esc(o.numero||'—')}</b></td>
      <td>${esc(o.cliente||'—')}</td>
      <td>${esc(o.embarcacao||'—')}</td>
      <td><span class="badge">${esc(o.workflowStatus||STAGES[0])}</span></td>
      <td>${esc(o.priority)}</td>
      <td>${esc(o.assignedTech||'Não atribuído')}</td>
      <td>${fmtDate(o.dataEntrada)}</td>
      <td>${dueCellHTML(o)}</td>
      <td>${(o.equipamentos||[]).length}</td>
    </tr>`;
  }).join('');

  const arrow = k => listSort.key===k ? (listSort.dir==='asc' ? ' ▲' : ' ▼') : '';
  const headHTML = LIST_COLUMNS.map(c=>`<th class="sortable" data-key="${c.key}">${esc(c.label)}${arrow(c.key)}</th>`).join('');

  el.innerHTML = `<div class="table-wrap"><table>
    <thead><tr>${headHTML}</tr></thead>
    <tbody>${rows}</tbody></table></div>`;

  el.querySelectorAll('th.sortable').forEach(th=>{
    th.addEventListener('click', ()=>{
      const key = th.dataset.key;
      if(listSort.key===key) listSort.dir = listSort.dir==='asc' ? 'desc' : 'asc';
      else { listSort.key = key; listSort.dir = 'asc'; }
      renderLista();
    });
  });
}

/* ---------------- Dashboard ---------------- */
function renderDash(){
  const el = document.getElementById('content');
  if(!ALL.length){ el.innerHTML = emptyStateHTML(); return; }
  const byStatus = {}; STAGES.forEach(s=>byStatus[s]=0);
  const byTech = {}; const byPriority = {}; PRIORITIES.forEach(p=>byPriority[p]=0);
  const overdue = []; const turnarounds = [];
  let openedThisMonth=0, deliveredThisMonth=0;
  let totalEquip=0, equipSemReparo=0;
  const nowMonth = new Date().getMonth(), nowYear = new Date().getFullYear();

  ALL.forEach(o=>{
    const st = o.workflowStatus || STAGES[0];
    byStatus[st] = (byStatus[st]||0)+1;
    const tech = o.assignedTech || 'Não atribuído';
    byTech[tech] = (byTech[tech]||0)+1;
    byPriority[o.priority||'Normal'] = (byPriority[o.priority||'Normal']||0)+1;
    if(isOverdue(o)) overdue.push(o);
    const nEquip = (o.equipamentos||[]).length;
    totalEquip += nEquip;
    if(st==='Sem Reparo') equipSemReparo += nEquip;
    if(o.dataEntrada){
      const d = parseLocalDate(o.dataEntrada);
      if(d && d.getMonth()===nowMonth && d.getFullYear()===nowYear) openedThisMonth++;
    }
    if(o.deliveredAt){
      const dd = new Date(o.deliveredAt);
      if(dd.getMonth()===nowMonth && dd.getFullYear()===nowYear) deliveredThisMonth++;
      if(o.dataEntrada){
        const days = (o.deliveredAt - parseLocalDate(o.dataEntrada).getTime())/86400000;
        if(days>=0) turnarounds.push(days);
      }
    }
  });
  const avgTurnaround = turnarounds.length ? Math.round(turnarounds.reduce((a,b)=>a+b,0)/turnarounds.length*10)/10 : null;
  const maxStatus = Math.max(1, ...Object.values(byStatus));
  const maxTech = Math.max(1, ...Object.values(byTech));

  const statusBars = Object.entries(byStatus).map(([s,v])=>`
    <div class="bar-row"><div class="lbl">${esc(s)}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxStatus*100)}%"></div></div><div>${v}</div></div>`).join('');
  const techBars = Object.entries(byTech).map(([s,v])=>`
    <div class="bar-row"><div class="lbl">${esc(s)}</div><div class="bar-track"><div class="bar-fill" style="width:${(v/maxTech*100)}%"></div></div><div>${v}</div></div>`).join('');
  const overdueRows = overdue.map(o=>`
    <tr class="row-os" onclick="openDetail('${esc(o.id)}')"><td>${esc(o.numero||'—')}</td><td>${esc(o.cliente||'—')}</td><td>${fmtDate(o.dueDate)}</td><td><span class="badge">${esc(o.workflowStatus)}</span></td></tr>`).join('');

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="v">${ALL.length}</div><div class="l">Total de OS</div></div>
      <div class="kpi"><div class="v">${openedThisMonth}</div><div class="l">Abertas este mês</div></div>
      <div class="kpi"><div class="v">${deliveredThisMonth}</div><div class="l">Entregues este mês</div></div>
      <div class="kpi"><div class="v">${avgTurnaround ?? '—'}</div><div class="l">Tempo médio (dias)</div></div>
      <div class="kpi ${overdue.length>0?'warn':''}"><div class="v">${overdue.length}</div><div class="l">SLA expirado</div></div>
      <div class="kpi"><div class="v">${totalEquip}</div><div class="l">Total de equipamentos</div></div>
      <div class="kpi"><div class="v">${equipSemReparo}</div><div class="l">Equipamentos sem reparo</div></div>
    </div>
    <div class="two-col">
      <div class="card"><h3>OS por status</h3><div class="bars">${statusBars}</div></div>
      <div class="card"><h3>OS por técnico responsável</h3><div class="bars">${techBars || '<span style="color:var(--muted)">Sem dados.</span>'}</div></div>
    </div>
    <div class="card">
      <h3>SLA expirado</h3>
      ${overdue.length ? `<div class="table-wrap"><table><thead><tr><th>Nº OS</th><th>Cliente</th><th>Prazo</th><th>Status</th></tr></thead><tbody>${overdueRows}</tbody></table></div>` : '<span style="color:var(--muted)">Nenhuma OS com SLA expirado. 🟢</span>'}
    </div>
  `;
}

/* ---------------- Equipe ---------------- */
function renderEquipe(){
  const el = document.getElementById('content');
  const techs = getTechs();
  const rows = techs.map(t=>`<tr><td>${esc(t)}</td><td style="text-align:right"><button class="btn sm danger" onclick="removeTech('${esc(t)}')">Remover</button></td></tr>`).join('');
  el.innerHTML = `
    <div class="card" style="max-width:520px">
      <h3>Adicionar técnico</h3>
      <div style="display:flex;gap:8px">
        <input id="newTechName" placeholder="Nome completo" style="flex:1;border:1px solid var(--line);border-radius:9px;padding:9px;background:var(--card);color:var(--text)">
        <button class="btn primary" onclick="addTech()">Adicionar</button>
      </div>
      <p style="color:var(--muted);font-size:12.5px;margin-top:10px">Técnicos que assinaram uma OS no campo "Responsável Técnico (Lab)" do WonderLab entram aqui automaticamente ao importar.</p>
    </div>
    <div class="table-wrap"><table><thead><tr><th>Técnico</th><th></th></tr></thead><tbody>${rows || '<tr><td colspan=2 style="color:var(--muted)">Nenhum técnico cadastrado ainda.</td></tr>'}</tbody></table></div>
  `;
}
function addTech(){
  const name = document.getElementById('newTechName').value.trim();
  if(!name) return;
  addTechIfMissing(name);
  toast('Técnico adicionado.', 'ok');
  renderEquipe();
}
function removeTech(name){
  if(!confirm('Remover este técnico da equipe?')) return;
  setTechs(getTechs().filter(t=>t!==name));
  toast('Técnico removido.', 'ok');
  renderEquipe();
}

/* ---------------- Detail modal ---------------- */
async function openDetail(id){
  const o = await idbGet(id); if(!o) return;
  const modal = document.getElementById('detailModal');
  const techs = getTechs();
  const techOptions = techs.map(t=>`<option value="${esc(t)}" ${o.assignedTech===t?'selected':''}>${esc(t)}</option>`).join('');
  const statusOptions = STAGES.map(s=>`<option value="${esc(s)}" ${(o.workflowStatus||STAGES[0])===s?'selected':''}>${esc(s)}</option>`).join('');
  const prioOptions = PRIORITIES.map(p=>`<option value="${esc(p)}" ${(o.priority||'Normal')===p?'selected':''}>${esc(p)}</option>`).join('');

  const equipHTML = (o.equipamentos||[]).map(eq=>`
    <div class="equip-block">
      <h4>${esc(eq.tipo)} — ${esc(eq.fabricante)} ${esc(eq.modelo)} <span class="badge" style="margin-left:6px">${esc(eq.status||'—')}</span></h4>
      <div class="grid2">
        <div><div class="k">Defeito relatado</div><div class="v">${esc(eq.defeito)||'—'}</div></div>
        <div><div class="k">Diagnóstico</div><div class="v">${esc(eq.diagnostico)||'—'}</div></div>
        <div><div class="k">Causa raiz</div><div class="v">${esc(eq.causaRaiz)||'—'}</div></div>
        <div><div class="k">Reparo aplicado</div><div class="v">${esc(eq.reparo)||'—'}</div></div>
        <div><div class="k">Teste final</div><div class="v">${esc(eq.testeFinal)||'—'} (${esc(eq.testeDuracao)||'—'})</div></div>
        <div><div class="k">Peças</div><div class="v">${(eq.pecas||[]).length ? eq.pecas.map(p=>esc(p.desc)+(p.codigo?' ('+esc(p.codigo)+')':'')+' x'+esc(p.qtd)).join(', ') : '—'}</div></div>
      </div>
      ${(eq.fotos||[]).length ? `<div class="photos">${eq.fotos.map(f=>`<img src="${f.data||''}" title="${esc(f.comentario||'')}">`).join('')}</div>` : ''}
    </div>
  `).join('');

  const checklistHTML = Object.entries(o.checklist||{}).map(([k,v])=>`
    <div>${esc(k)}</div><div class="chk-${v}">${v==='ok'?'Conforme':v==='nok'?'Não conforme':'N/A'}</div>
  `).join('');

  document.getElementById('detailModalInner').innerHTML = `
    <div class="modal-head">
      <div>
        <h2>${esc(o.numero||'(sem número)')} — ${esc(o.cliente||'—')}</h2>
        <div class="sub">${esc(o.embarcacao||'—')} · Entrada em ${fmtDate(o.dataEntrada)} · Técnico de bancada: ${esc(o.tecnico||'—')}</div>
      </div>
      <button class="x" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body">
      <div class="card" style="box-shadow:none;border:1px solid var(--line);margin-bottom:14px">
        <h3 style="font-size:14px">Gestão da OS</h3>
        <div class="field-row">
          <div><label>Status</label><select id="mStatus" onchange="refreshSlaConfirm()">${statusOptions}</select></div>
          <div><label>Prioridade</label><select id="mPriority" onchange="refreshDuePreview()" data-entrada="${esc(o.dataEntrada||'')}">${prioOptions}</select></div>
          <div><label>Responsável</label><select id="mTech"><option value="">Não atribuído</option>${techOptions}</select></div>
          <div><label>Prazo (SLA)</label><input type="date" id="mDue" value="${o.dueDate||''}" onchange="refreshSlaConfirm()"></div>
          <div><label>Pronto em (SLA)</label><input type="date" id="mReadyAt" value="${o.readyAt||''}" onchange="refreshSlaConfirm()" ${READY_STAGES.includes(o.workflowStatus||STAGES[0])?'':'disabled'}></div>
        </div>
        <div id="slaConfirm" style="margin-bottom:12px">${slaConfirmHTML(o)}</div>
        <label style="display:block;font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;font-weight:700">Notas internas (gestão)</label>
        <textarea id="mNotes" rows="2" style="width:100%;border:1px solid var(--line);border-radius:9px;padding:8px;font-family:inherit;background:var(--card);color:var(--text)">${esc(o.notesInternas||'')}</textarea>
      </div>

      <h3 class="h-navy" style="margin-bottom:10px">Equipamentos (${(o.equipamentos||[]).length})</h3>
      ${equipHTML}

      <h3 class="h-navy" style="margin:14px 0 8px">Checklist de bancada</h3>
      <div class="checklist-grid">${checklistHTML || '<span style="color:var(--muted)">Sem checklist.</span>'}</div>

      ${o.obs ? `<h3 class="h-navy" style="margin:14px 0 8px">Observações do técnico</h3><p>${esc(o.obs)}</p>` : ''}
    </div>
    <div class="modal-foot">
      <button class="btn danger" onclick="deleteOrder('${esc(o.id)}')">Excluir do painel</button>
      <button class="btn primary" onclick="saveDetail('${esc(o.id)}')">Salvar alterações</button>
    </div>
  `;
  modal.classList.add('show');
}
function closeDetail(){ document.getElementById('detailModal').classList.remove('show'); }
document.getElementById('detailModal').addEventListener('click', e=>{ if(e.target.id==='detailModal') closeDetail(); });

async function saveDetail(id){
  const status = document.getElementById('mStatus').value;
  const priority = document.getElementById('mPriority').value;
  const tech = document.getElementById('mTech').value;
  const due = document.getElementById('mDue').value;
  const readyAt = document.getElementById('mReadyAt').value;
  const notes = document.getElementById('mNotes').value;
  const patch = { workflowStatus: status, priority, assignedTech: tech, dueDate: due, notesInternas: notes };
  const rec = await idbGet(id);
  if(status==='Entregue ao Cliente'){ patch.deliveredAt = (rec && rec.deliveredAt) || Date.now(); }
  else patch.deliveredAt = null;
  // "Pronto em (SLA)": só é gravado quando o status é um estágio de reparo concluído
  // (segue o campo de data do modal, ou hoje se estiver vazio). Quando o status volta
  // para andamento, o campo NÃO é alterado — permanece com o valor já gravado, e só
  // muda de novo por edição manual aqui no modal.
  if(READY_STAGES.includes(status)) patch.readyAt = readyAt || todayISO();
  await updateOrder(id, patch);
  toast('OS atualizada.', 'ok');
  closeDetail();
  render();
}
async function deleteOrder(id){
  if(!confirm('Excluir esta OS deste painel? Isso não afeta o arquivo/OS original no WonderLab.')) return;
  await idbDelete(id);
  await loadAll();
  toast('OS excluída do painel.', 'ok');
  closeDetail();
  render();
}

(async function init(){
  try{ const th = localStorage.getItem('wlp_theme'); if(th) document.documentElement.setAttribute('data-theme', th); }catch(e){}
  document.getElementById('buildLbl').textContent = BUILD;
  await loadAll();
  render();
})();
</script>
